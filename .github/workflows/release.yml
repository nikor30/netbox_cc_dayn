name: Release

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "CHANGELOG.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag override (e.g. v1.0.0); default derives from pyproject.toml"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag from pyproject.toml
        id: tag
        env:
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          if [ -n "$TAG_OVERRIDE" ]; then
            tag="$TAG_OVERRIDE"
          else
            version=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
            tag="v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release (skipped if the tag already exists)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "DayN-NetBox Bridge $TAG" \
            --notes-file CHANGELOG.md
